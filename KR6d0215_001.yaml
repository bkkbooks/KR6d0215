body:
  text: 唐天台沙門釋湛然述夫三諦者天然之性德也中諦者統一切法真諦者泯一切法俗諦者立一切法舉一即三非前後也含生本具非造作之所得也悲夫祕藏不顯葢三惑之所覆也故無明翳乎法性塵沙障乎化導見思阻乎空寂然茲三惑乃體上之虛妄也於是大覺慈尊喟然嘆曰真如界內絕生佛之假名平等慧中無自他之形相但以眾生妄想不自證得莫之能返也由是立乎三觀破乎三惑證乎三智成乎三德空觀者破見思惑證一切智成般若德假觀者破塵沙惑證道種智成解脫德中觀者破無明惑證一切種智成法身德然茲三惑三觀三智三德非各別也非異時也天然之理具諸法故然此三諦性之自爾迷茲三諦轉成三惑惑破藉乎三觀觀成證乎三智智成成乎三德從因至果非漸修也說之次第理非次第大綱如此綱目可尋
